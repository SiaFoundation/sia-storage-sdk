name: Kotlin SDK build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to Maven Central'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build native library (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libindexd_ffi.so
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib: libindexd_ffi.so
          # macOS x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            lib: libindexd_ffi.dylib
          # macOS ARM64
          - os: macos-14
            target: aarch64-apple-darwin
            lib: libindexd_ffi.dylib
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: indexd_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native library
        run: cargo build --release --target ${{ matrix.target }}
        # Fix for ring crate cross-compilation on aarch64
        # See: https://github.com/briansmith/ring/issues/1789
        env:
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}

  generate:
    name: Generate Kotlin bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build library
        run: cargo build --release

      - name: Generate Kotlin bindings
        run: cargo run --bin uniffi-bindgen generate --library target/release/libindexd_ffi.so --language kotlin --out-dir bindings --config kotlin/uniffi.toml --no-format

      - name: Upload bindings
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: bindings/

  test:
    name: Test (${{ matrix.os }})
    needs: [build, generate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            jna_dir: linux-x86-64
          - os: macos-14
            target: aarch64-apple-darwin
            jna_dir: darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            jna_dir: win32-x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: kotlin/src/main/kotlin

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: kotlin/src/main/resources/${{ matrix.jna_dir }}

      - name: Run tests
        working-directory: kotlin
        run: gradle test

  package:
    name: Package JAR
    needs: [build, generate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: kotlin/src/main/kotlin

      - name: Download linux-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-unknown-linux-gnu
          path: kotlin/src/main/resources/linux-x86-64

      - name: Download linux-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-unknown-linux-gnu
          path: kotlin/src/main/resources/linux-aarch64

      - name: Download darwin-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-apple-darwin
          path: kotlin/src/main/resources/darwin-x86-64

      - name: Download darwin-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin
          path: kotlin/src/main/resources/darwin-aarch64

      - name: Download win32-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-pc-windows-msvc
          path: kotlin/src/main/resources/win32-x86-64

      - name: Build JAR
        working-directory: kotlin
        run: gradle build -x test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: kotlin/build/libs/siaindexd-*.jar

  publish:
    name: Publish to Maven Central
    needs: package
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: kotlin/src/main/kotlin

      - name: Download linux-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-unknown-linux-gnu
          path: kotlin/src/main/resources/linux-x86-64

      - name: Download linux-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-unknown-linux-gnu
          path: kotlin/src/main/resources/linux-aarch64

      - name: Download darwin-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-apple-darwin
          path: kotlin/src/main/resources/darwin-x86-64

      - name: Download darwin-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin
          path: kotlin/src/main/resources/darwin-aarch64

      - name: Download win32-x86-64
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-pc-windows-msvc
          path: kotlin/src/main/resources/win32-x86-64

      - name: Publish
        working-directory: kotlin
        run: gradle publish
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
