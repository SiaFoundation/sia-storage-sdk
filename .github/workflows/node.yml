name: Node.js SDK build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build native (${{ matrix.target }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            prebuild: linux-x64-gnu
            lib: libsia_storage_ffi.so
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            prebuild: linux-arm64-gnu
            lib: libsia_storage_ffi.so
          # macOS x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            prebuild: darwin-x64
            lib: libsia_storage_ffi.dylib
          # macOS ARM64
          - os: macos-14
            target: aarch64-apple-darwin
            prebuild: darwin-arm64
            lib: libsia_storage_ffi.dylib
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            prebuild: win32-x64
            lib: sia_storage_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native library
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.prebuild }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}

  package:
    name: Assemble npm package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install uniffi-bindgen-node-js
        run: cargo install --git https://github.com/SiaFoundation/uniffi-bindgen-node-js --rev cafa761cc510e48c51ed6e45b400429f59f8f53e

      - name: Build and generate bindings
        run: ./node/build.sh --bundled-prebuilds

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: node/generated/prebuilds

      - name: Arrange prebuilds
        run: |
          cd node/generated/prebuilds
          for dir in native-*; do
            target="${dir#native-}"
            mkdir -p "$target"
            mv "$dir"/* "$target/"
            rmdir "$dir"
          done
          find . -type f

      - name: Pack tarball
        run: cd node/generated && npm pack

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: node/generated/*.tgz

  test:
    name: Test (${{ matrix.os }} - Node ${{ matrix.node }})
    needs: package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '20'
          - os: macos-14
            node: '20'
          - os: windows-latest
            node: '20'

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: pkg

      - name: Install package
        shell: bash
        run: |
          mkdir test-project && cd test-project
          npm init -y
          node -e "let p=require('./package.json'); p.type='module'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2))"
          npm install ../pkg/*.tgz

      - name: Test import and basic functionality
        shell: bash
        run: |
          cd test-project
          node --input-type=module -e "
            import { generate_recovery_phrase, validate_recovery_phrase, SDK, Builder } from 'sia-storage-sdk';
            console.log('Import successful');
            const phrase = generate_recovery_phrase();
            validate_recovery_phrase(phrase);
            console.log('Recovery phrase:', phrase.substring(0, 20) + '...');
            console.log('All tests passed');
          "

  publish:
    name: Publish to npm
    needs: [package, test]
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'true'
    permissions:
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: pkg

      - name: Publish to npm
        run: npm publish pkg/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
