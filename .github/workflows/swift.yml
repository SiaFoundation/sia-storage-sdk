name: Swift SDK build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build XCFramework
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build XCFramework
        run: ./swift/build.sh

      - name: Upload XCFramework
        uses: actions/upload-artifact@v6
        with:
          name: SiaStorageSDKFFI-xcframework
          path: build/SiaStorageSDKFFI.xcframework.zip

      - name: Compute and save checksum
        run: |
          CHECKSUM=$(swift package compute-checksum build/SiaStorageSDKFFI.xcframework.zip)
          echo "$CHECKSUM" > checksum.txt
          echo "Checksum: $CHECKSUM"

      - name: Upload checksum
        uses: actions/upload-artifact@v6
        with:
          name: checksum
          path: checksum.txt

  test:
    name: Test Swift package
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Download XCFramework
        uses: actions/download-artifact@v6
        with:
          name: SiaStorageSDKFFI-xcframework
          path: build

      - name: Extract XCFramework
        run: unzip -q build/SiaStorageSDKFFI.xcframework.zip -d build

      - name: Build package
        run: SIA_STORAGE_SDK_USE_LOCAL_XCFRAMEWORK=1 swift build

      - name: Build example
        run: |
          cd examples/swift
          SIA_STORAGE_SDK_USE_LOCAL_XCFRAMEWORK=1 swift build

      - name: Build downstream consumer package
        run: |
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          swift package init --type executable
          rm -rf Sources/*
          mkdir -p Sources/ConsumerSmoke
          cat > Package.swift <<EOF
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "ConsumerSmoke",
              platforms: [
                  .iOS(.v16),
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "${GITHUB_WORKSPACE}")
              ],
              targets: [
                  .executableTarget(
                      name: "ConsumerSmoke",
                      dependencies: [
                          .product(name: "SiaStorageSDK", package: "sia-storage-sdk")
                      ]
                  )
              ]
          )
          EOF
          cat > Sources/ConsumerSmoke/main.swift <<'EOF'
          import SiaStorageSDK
          import Foundation

          let _ = try Builder(indexerUrl: "https://app.sia.storage", appMeta: AppMeta(id: Data(repeating: 0x01, count: 32), name: "smoke test", description: "smoke test", serviceUrl: "https://example.com", logoUrl: nil, callbackUrl: nil))
          print("consumer smoke build ok")
          EOF
          SIA_STORAGE_SDK_USE_LOCAL_XCFRAMEWORK=1 swift build

  publish:
    name: Publish to GitHub Releases
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'true' && github.event.inputs.version != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download XCFramework
        uses: actions/download-artifact@v6
        with:
          name: SiaStorageSDKFFI-xcframework
          path: dist

      - name: Download checksum
        uses: actions/download-artifact@v6
        with:
          name: checksum
          path: dist

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in semver format (e.g., 1.0.0), got: $VERSION"
            exit 1
          fi

      - name: Prepare release assets
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          cd dist
          mv SiaStorageSDKFFI.xcframework.zip "SiaStorageSDKFFI-${VERSION}.xcframework.zip"
          SHA256=$(shasum -a 256 "SiaStorageSDKFFI-${VERSION}.xcframework.zip" | cut -d' ' -f1)
          SPM_CHECKSUM=$(cat checksum.txt)
          echo "SiaStorageSDKFFI-${VERSION}.xcframework.zip: $SHA256" > CHECKSUMS.txt
          echo "CHECKSUM_CONTENT=$(cat CHECKSUMS.txt)" >> "$GITHUB_ENV"
          echo "SPM_CHECKSUM=$SPM_CHECKSUM" >> "$GITHUB_ENV"

      - name: Validate manifest metadata
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          MANIFEST_URL=$(awk -F'"' '/url: "https:\/\/github.com\/SiaFoundation\/sia-storage-sdk\/releases\/download\/v/ {print $2}' Package.swift)
          MANIFEST_VERSION=$(echo "$MANIFEST_URL" | sed -E 's#.*\/download\/v([0-9]+\.[0-9]+\.[0-9]+)\/.*#\1#')
          PODSPEC_VERSION=$(awk -F"'" '/s.version/ {print $2}' SiaStorageSDK.podspec)

          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "Error: Package.swift release URL version ($MANIFEST_VERSION) does not match workflow version ($VERSION)"
            exit 1
          fi

          if [ "$PODSPEC_VERSION" != "$VERSION" ]; then
            echo "Error: SiaStorageSDK.podspec version ($PODSPEC_VERSION) does not match workflow version ($VERSION)"
            exit 1
          fi

      - name: Update Package.swift checksum and tag release
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -z "$SPM_CHECKSUM" ]; then
            echo "Error: SPM_CHECKSUM not set"
            exit 1
          fi
          sed -i "s/checksum: \".*\"/checksum: \"$SPM_CHECKSUM\"/" Package.swift
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "swift: update checksum for v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin HEAD:${{ github.ref_name }} "v${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: SiaStorageSDK Swift v${{ github.event.inputs.version }}
          body: |
            ## SiaStorageSDK for Swift v${{ github.event.inputs.version }}

            ### Installation

            #### Swift Package Manager

            Add to your `Package.swift`:
            ```swift
            dependencies: [
                .package(url: "https://github.com/SiaFoundation/sia-storage-sdk", from: "${{ github.event.inputs.version }}")
            ]
            ```

            Or add via Xcode: File → Add Packages → Enter repository URL.

            #### CocoaPods

            ```ruby
            pod 'SiaStorageSDK', '~> ${{ github.event.inputs.version }}'
            ```

            ### Checksums
            SHA-256:
            ```
            ${{ env.CHECKSUM_CONTENT }}
            ```

            SPM (`swift package compute-checksum`):
            ```
            ${{ env.SPM_CHECKSUM }}
            ```
          files: |
            dist/SiaStorageSDKFFI-${{ github.event.inputs.version }}.xcframework.zip
            dist/CHECKSUMS.txt
          draft: false
          prerelease: false

  smoke-test-release:
    name: Smoke test published release
    needs: publish
    runs-on: macos-15
    if: github.event.inputs.publish == 'true' && github.event.inputs.version != ''
    steps:
      - name: Build downstream package from released tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          swift package init --type executable
          rm -rf Sources/*
          mkdir -p Sources/ReleaseSmoke
          cat > Package.swift <<EOF
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "ReleaseSmoke",
              platforms: [
                  .iOS(.v16),
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(url: "https://github.com/SiaFoundation/sia-storage-sdk", exact: "$VERSION")
              ],
              targets: [
                  .executableTarget(
                      name: "ReleaseSmoke",
                      dependencies: [
                          .product(name: "SiaStorageSDK", package: "sia-storage-sdk")
                      ]
                  )
              ]
          )
          EOF
          cat > Sources/ReleaseSmoke/main.swift <<'EOF'
          import SiaStorageSDK
          import Foundation

          let _ = try Builder(indexerUrl: "https://app.sia.storage", appMeta: AppMeta(id: Data(repeating: 0x01, count: 32), name: "smoke test", description: "smoke test", serviceUrl: "https://example.com", logoUrl: nil, callbackUrl: nil))
          print("release smoke build ok")
          EOF

          for ATTEMPT in 1 2 3 4 5; do
            if swift build; then
              exit 0
            fi
            echo "Retrying release smoke test ($ATTEMPT/5)..."
            swift package reset || true
            rm -rf .build
            sleep 10
          done

          echo "Release smoke test failed after retries"
          exit 1
