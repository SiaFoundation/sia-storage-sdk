[package]
name = "indexd-sdk"
version = "0.3.0"
edition = "2024"
repository = "https://github.com/SiaFoundation/indexd-sdk"
license = "MIT"
description = "UniFFI bindings for the Sia network indexer SDK"
authors = ["The Sia Foundation"]

[lib]
name = "indexd_ffi"
crate-type = ["cdylib", "staticlib"]

[dependencies]
upstream_ffi = { package = "indexd_ffi", git = "https://github.com/SiaFoundation/sia-sdk-rs" }
uniffi = { version = "=0.29.4", features = ["cli", "tokio"] }

[[bin]]
name = "uniffi-bindgen"
